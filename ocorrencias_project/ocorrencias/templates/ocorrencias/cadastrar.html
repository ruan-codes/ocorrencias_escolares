{% extends 'ocorrencias/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Nova Ocorrência</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ form.nome_aluno.label }}</label>
                        {{ form.nome_aluno }}
                        {% if form.nome_aluno.errors %}
                            <div class="text-danger small">{{ form.nome_aluno.errors }}</div>
                        {% endif %}
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">{{ form.curso.label }}</label>
                            {{ form.curso }}
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">{{ form.ano.label }}</label>
                            {{ form.ano }}
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">{{ form.gravidade.label }}</label>
                            {{ form.gravidade }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ form.data.label }}</label>
                        {{ form.data }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ form.descricao.label }}</label>
                        {{ form.descricao }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">
                            <i class="bi bi-save"></i> Salvar
                        </button>
                        <a href="{% url 'listar' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
