{% if gravidade == 'leve' %}
  <span class="badge badge-soft-success"><i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Leve</span>
{% elif gravidade == 'media' %}
  <span class="badge badge-soft-warning"><i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Média</span>
{% else %}
  <span class="badge badge-soft-danger"><i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Grave</span>
{% endif %}
