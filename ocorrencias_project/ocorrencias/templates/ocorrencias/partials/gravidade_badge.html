{% if gravidade == 'leve' %}
  <span class="badge bg-success"><i class="bi bi-circle-fill me-1" style="font-size:.55rem"></i>Leve</span>
{% elif gravidade == 'media' %}
  <span class="badge bg-warning text-dark"><i class="bi bi-circle-fill me-1" style="font-size:.55rem"></i>Média</span>
{% else %}
  <span class="badge bg-danger"><i class="bi bi-circle-fill me-1" style="font-size:.55rem"></i>Grave</span>
{% endif %}
