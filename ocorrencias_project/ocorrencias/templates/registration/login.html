<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Ocorrências AFS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
      body {
        background-color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        border: none;
        border-radius: 1rem;
        box-shadow: 0 8px 32px rgba(0,0,0,.4);
      }
      .login-header {
        background: #212529;
        border-radius: 1rem 1rem 0 0;
        padding: 2rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-card card">
      <div class="login-header">
        <i class="bi bi-journal-text text-warning fs-1"></i>
        <h4 class="text-white fw-bold mt-2 mb-0">Ocorrências AFS</h4>
        <p class="text-secondary small mb-0">Sistema de Registro Escolar</p>
      </div>
      <div class="card-body p-4">
        <h6 class="text-muted mb-3">Acesso ao sistema</h6>

        {% if form.errors %}
          <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle me-1"></i>
            Usuário ou senha incorretos.
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}" />

          <div class="mb-3">
            <label class="form-label fw-semibold small">Usuário</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
              <input
                type="text"
                name="username"
                class="form-control"
                placeholder="seu.usuario"
                autofocus
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold small">Senha</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                name="password"
                class="form-control"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-dark w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
