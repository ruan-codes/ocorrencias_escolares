{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Ocorrências AFS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="{% static 'ocorrencias/css/app.css' %}" rel="stylesheet" />
  </head>
  <body class="login-page">
    <main class="login-card">
      <header class="login-header">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">AFS</span>
          <span>
            <span class="brand-title">Ocorrências AFS</span>
            <span class="brand-subtitle">Sistema de registro escolar</span>
          </span>
        </div>
      </header>

      <section class="p-4">
        <p class="page-kicker">Acesso restrito</p>
        <h1 class="h4 fw-bold mb-3">Entrar no sistema</h1>

        {% if form.errors %}
          <div class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>
            Usuário ou senha incorretos.
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}" />

          <div class="mb-3">
            <label class="form-label small" for="id_username">Usuário</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
              <input
                type="text"
                id="id_username"
                name="username"
                class="form-control"
                placeholder="seu.usuario"
                autocomplete="username"
                autofocus
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label small" for="id_password">Senha</label>
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                id="id_password"
                name="password"
                class="form-control"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
          </button>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
